<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Oposiciones - Academia</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f1f5f9; color: #1e293b; }
        .contenedor { max-width: 1000px; margin: auto; }
        h1 { color: #0f172a; border-bottom: 3px solid #3b82f6; padding-bottom: 10px; margin-bottom: 5px; }
        .subtitulo { color: #64748b; margin-bottom: 25px; }
        .bloque-filtros { display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; }
        .btn-filtro { background-color: white; color: #475569; border: 2px solid #cbd5e1; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.2s ease; }
        .btn-filtro:hover { border-color: #3b82f6; color: #3b82f6; }
        .btn-filtro.activo { background-color: #3b82f6; color: white; border-color: #2563eb; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-bottom: 30px; }
        th, td { padding: 14px 18px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background-color: #f8fafc; color: #475569; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        tr:hover td { background-color: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .badge-municipal { background-color: #ffe4e6; color: #9f1239; }
        .badge-insular { background-color: #fef3c7; color: #92400e; }
        .badge-autonomica { background-color: #dbeafe; color: #1e40af; }
        .enlace-boib { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .enlace-boib:hover { text-decoration: underline; }
        .sin-resultados { text-align: center; padding: 40px; color: #64748b; font-weight: 500; }
    </style>
</head>
<body>

    <div class="contenedor">
        <button style="background: #475569; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;" onclick="window.location.href='/'">⬅️ Volver al Menú</button>
        <h1>📋 Buscador de Ofertas de Empleo Público</h1>
        <div class="subtitulo">Monitoreo automatizado de plazas y edictos oficiales publicados en el BOIB.</div>

        <div class="bloque-filtros">
            <button class="btn-filtro activo" onclick="filtrarProcesos('todos', this)">🌍 Ver Todo</button>
            <button class="btn-filtro" onclick="filtrarProcesos('municipal', this)">🏙️ Municipales (Ayuntamientos)</button>
            <button class="btn-filtro" onclick="filtrarProcesos('insular', this)">🚗 Insulares (Consells)</button>
            <button class="btn-filtro" onclick="filtrarProcesos('autonomica', this)">🏛️ Autonómicos (Govern / CAIB)</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th style="width: 45%;">Puesto / Categoría</th>
                    <th style="width: 25%;">Organismo / Ente</th>
                    <th style="width: 15%;">Ámbito</th>
                    <th style="width: 15%;">Enlace</th>
                </tr>
            </thead>
            <tbody id="tabla-cuerpo">
                <tr><td colspan="4" class="sin-resultados">🔍 Escaneando el boletín oficial del BOIB en tiempo real... Por favor, espera.</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function cargarOposiciones(tipoFiltro = 'todos') {
            const cuerpoTabla = document.getElementById('tabla-cuerpo');
            
            try {
                let url = '/procesos';
                if (tipoFiltro !== 'todos') {
                    url += `?tipo=${tipoFiltro}`;
                }

                const respuesta = await fetch(url);
                const datos = await respuesta.json();

                if (datos.length === 0) {
                    cuerpoTabla.innerHTML = `<tr><td colspan="4" class="sin-resultados">ℹ️ No se han registrado convocatorias de este ámbito en las publicaciones recientes del BOIB.</td></tr>`;
                    return;
                }

                let htmlFilas = "";
                datos.forEach(proceso => {
                    let claseBadge = "badge-municipal";
                    let nombreVisualBadge = "Municipal";

                    if (proceso.type === "insular") {
                        claseBadge = "badge-insular";
                        nombreVisualBadge = "Insular";
                    } else if (proceso.type === "autonomica") {
                        claseBadge = "badge-autonomica";
                        nombreVisualBadge = "Autonómica";
                    }

                    htmlFilas += `
                        <tr>
                            <td><strong>${proceso.puesto}</strong></td>
                            <td>${proceso.ente}</td>
                            <td><span class="badge ${claseBadge}">${nombreVisualBadge}</span></td>
                            <td><a href="${proceso.url}" target="_blank" class="enlace-boib">🔗 Ver BOIB</a></td>
                        </tr>
                    `;
                });

                cuerpoTabla.innerHTML = htmlFilas;

            } catch (error) {
                cuerpoTabla.innerHTML = `<tr><td colspan="4" class="sin-resultados" style="color:red;">⚠️ Error al conectar con el servidor backend.</td></tr>`;
            }
        }

        function filtrarProcesos(tipo, botonPulsado) {
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('activo'));
            botonPulsado.classList.add('activo');
            cargarOposiciones(tipo);
        }

        cargarOposiciones();
    </script>
</body>
</html>
